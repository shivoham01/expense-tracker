<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰Expense Tracker</h1>
            <select name="months" id="months">
                <option value="Jan">Jan</option>
                <option value="Feb">Feb</option>
                <option value="Mar">Mar</option>
                <option value="Apr">Apr</option>
                <option value="May">May</option>
                <option value="Jun">Jun</option>
                <option value="Jul">Jul</option>
                <option value="Aug">Aug</option>
                <option value="Sep">Sep</option>
                <option value="Oct">Oct</option>
                <option value="Nov">Nov</option>
                <option value="Dec">Dec</option>
            </select>
        </div>

        <div class="summary">
            <div class="summary-card">
                <h3>Total Income</h3>
                <p class="income" id="total-income">₹0.00</p>
            </div>
            <div class="summary-card">
                <h3>Total Expenses</h3>
                <p class="expense" id="total-expense">₹0.00</p>
            </div>
            <div class="summary-card">
                <h3>Balance</h3>
                <p class="balance" id="balance">₹0.00</p>
            </div>
        </div>

        <div class="form-section">
            <h2>Add Transaction</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <input type="text" class="inp" id="title" placeholder="Title" required>
                    <input type="number" class="inp" id="amount" placeholder="Amount" step="0.01" required>
                    <input type="date" class="inp" id="date" step="0.01" required>
                    <select id="type" class="inp" required>
                        <option value="">Select Type</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <select id="category" class="inp" required>
                        <option value="">Select Category</option>
                        <option value="salary">Salary</option>
                        <option value="freelance">Freelance</option>
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="utilities">Utilities</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button type="submit" id="add-transaction" class="btn">Add Transaction</button>
            </form>
        </div>

        <!-- TRANSACTION LIST SECTION - This shows your expenses/income -->
        <div class="transactions">
            <h2>Transaction History</h2>
            <div class="filter-section">
                <button type="button" class="filter-btn active" data-filter="all">All</button>
                <button type="button" class="filter-btn" data-filter="income">Income</button>
                <button type="button" class="filter-btn" data-filter="expense">Expenses</button>
            </div>
            <div class="transaction-list" id="transactionList">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
